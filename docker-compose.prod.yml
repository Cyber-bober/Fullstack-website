version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: football-postgres
    restart: always
    environment:
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football_pass
      POSTGRES_DB: football_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football -d football_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: football-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://football:football_pass@postgres:5432/football_db?schema=public"
      NEXTAUTH_SECRET: "my-super-secret-key-1234567890"
      NEXTAUTH_URL: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: