services:
  postgres:
    image: postgres:16-alpine
    container_name: football-postgres
    environment:
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football_pass
      POSTGRES_DB: football_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U football -d football_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: football-app
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./scripts:/app/scripts
      - ./prisma:/app/prisma
      - ./package.json:/app/package.json
    environment:
      - DATABASE_URL=postgresql://football:football_pass@postgres:5432/football_db?schema=public
      - NEXTAUTH_SECRET=Y9D8Rw+pOe8aaGyYi97xlYN43FXN/BcwSHVFUjLD1Pk=
      - NEXTAUTH_URL=http://localhost:3000
      - WATCHPACK_POLLING=true
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data: